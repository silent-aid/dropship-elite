<!DOCTYPE html>
<html>

<head>

<title>Star Fusion 7 | Pre Order</title>


<style>

body{

background:#080808;
color:white;
font-family:Arial;

}


.container{

padding:60px 8%;
text-align:center;

}


h1{

color:#ffb703;

}


form{

max-width:600px;
margin:auto;
background:#151515;
padding:35px;
border-radius:20px;

}


input,select,textarea{

width:100%;
padding:15px;
margin:10px 0;
background:#050505;
color:white;
border:1px solid #444;
border-radius:10px;

}


button{

width:100%;
padding:15px;
background:#ffb703;
border:none;
border-radius:50px;
font-weight:bold;
font-size:18px;

}


</style>


</head>


<body>


<div class="container">


<h1>
🍱 Star Fusion 7 Pre Order
</h1>


<form onsubmit="order();return false;">


<input id="name" placeholder="Your Name" required>



<select id="school">

<option>
Select School / College
</option>

<option>
New Malakpet School
</option>

<option>
Royal Residency
</option>

<option>
Other Institution
</option>

</select>



<select id="menu">


<option>
Select Menu
</option>

<option>
Monday Chicken Biryani
</option>

<option>
Tuesday Veg Meal
</option>

<option>
Friday Special Box
</option>


</select>




<select id="qty">

<option>
Select Quantity
</option>

<option>
10 Lunch Boxes
</option>

<option>
25 Lunch Boxes
</option>

<option>
50 Lunch Boxes
</option>

<option>
100+ Bulk Order
</option>

</select>



<input id="date" type="date">



<textarea id="msg" placeholder="Extra requirements"></textarea>


<button>
Confirm Pre Order
</button>


</form>


</div>




<script>


function order(){


let text=

"🍱 Star Fusion 7 Order%0A%0"+
"Name: "+name.value+
"%0ASchool: "+school.value+
"%0AMenu: "+menu.value+
"%0AQuantity: "+qty.value+
"%0ADate: "+date.value+
"%0AMessage: "+msg.value;



window.open(

"https://wa.me/YOUR_NUMBER?text="+text

);


}



</script>


</body>

</html>
